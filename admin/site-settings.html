        <div class="main-content">
            <div class="header-area"><div class="row align-items-center">

            </div></div></div>

            <div class="main-content-inner" id="main-content">
                <div class="row mt-4" id="settingsContainer"></div>
                <div class="row mt-3 mb-5">
                    <div class="col-12">
                        <button class="btn btn-primary btn-lg" onclick="saveAllSettings()">
                            <i class="fa-solid fa-save"></i> Lưu tất cả thay đổi

    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/metismenujs.min.js"></script>
    <script src="assets/js/scripts.js"></script>
    <script src="js/api.js"></script>
    <script>
        function getAdminId() { try { return JSON.parse(localStorage.getItem('admin')).admin_id; } catch(e) { return 1; } }

        var groupLabels = {
            general: 'Thông tin chung',
            contact: 'Thông tin liên hệ',
            seo: 'SEO / Meta',
            social: 'Mạng xã hội',
            payment: 'Thanh toán',
            shipping: 'Vận chuyển'
        };

        function loadSettings() {
            AdminAPI.settings.grouped().then(function(res) {
                if (!res.success) return;
                var groups = res.data;
                var html = '';
                for (var group in groups) {
                    var label = groupLabels[group] || group;
                    html += '<div class="col-md-6 mb-4"><div class="card"><div class="card-body">';
                    html += '<h5 class="card-title mb-3"><i class="fa-solid fa-cog me-2"></i>' + label + '</h5>';
                    var settings = groups[group];
                    for (var key in settings) {
                        var val = settings[key] || '';
                        var isLong = val.length > 80;
                        html += '<div class="mb-3"><label class="form-label fw-bold">' + key + '</label>';
                        if (isLong) {
                            html += '<textarea class="form-control setting-input" data-key="' + key + '" rows="3">' + val + '</textarea>';
                        } else {
                            html += '<input type="text" class="form-control setting-input" data-key="' + key + '" value="' + val.replace(/"/g, '&quot;') + '">';
                        }
                        html += '</div>';
                    }
                    html += '</div></div></div>';
                }
                document.getElementById('settingsContainer').innerHTML = html || '<div class="col-12"><p>Chưa có cài đặt nào</p></div>';
            });
        }

        function saveAllSettings() {
            var inputs = document.querySelectorAll('.setting-input');
            var settings = {};
            inputs.forEach(function(el) {
                settings[el.dataset.key] = el.value;
            });
            AdminAPI.settings.update(settings, getAdminId()).then(function(res) {
                if (res.success) {
                    if (window.SRTdash) SRTdash.toast('Lưu cài đặt thành công!', 'success');
                    loadSettings();
                } else {
                    alert(res.message);
                }
            });
        }

        loadSettings();
    </script>
</body>
</html>
