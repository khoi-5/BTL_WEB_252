<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Quản lý FAQ - Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="assets/images/icon/logo.png">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/fontawesome.min.css">
    <link rel="stylesheet" href="assets/css/themify-icons.css">
    <link rel="stylesheet" href="assets/css/metismenujs.min.css">
    <link rel="stylesheet" href="assets/css/typography.css">
    <link rel="stylesheet" href="assets/css/default-css.css">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
    <div id="preloader"><div class="loader"></div></div>
    <div class="page-container">
        <div class="sidebar-menu">
            <div class="sidebar-header"><div class="logo"><a href="index.html"><img src="assets/images/icon/logo.png" alt="logo"></a></div></div>
            <div class="main-menu"><div class="menu-inner"><nav>
                <ul class="metismenu" id="menu">
                    <li><a href="profile.html"><i class="fa-solid fa-user"></i><span>Tài khoản</span></a></li>
                    <li><a href="customers.html"><i class="fa-solid fa-users"></i><span>Khách hàng</span></a></li>
                    <li><a href="contacts.html"><i class="fa-solid fa-envelope"></i><span>Liên hệ</span></a></li>
                    <li class="active"><a href="faq.html"><i class="fa-solid fa-circle-question"></i><span>Hỏi đáp</span></a></li>
                    <li><a href="categories.html"><i class="fa-solid fa-folder"></i><span>Danh mục</span></a></li>
                    <li><a href="site-settings.html"><i class="fa-solid fa-gear"></i><span>Cài đặt</span></a></li>
                    <li><a href="products.html"><i class="fa-solid fa-book"></i><span>Sản phẩm</span></a></li>
                    <li><a href="orders.html"><i class="fa-solid fa-receipt"></i><span>Đơn hàng</span></a></li>
                </ul>
            </nav></div></div>
        </div>
        <div class="main-content">
            <div class="header-area"><div class="row align-items-center">
                <div class="col-md-6 col-sm-8 clearfix"><div class="nav-btn float-start"><span></span><span></span><span></span></div></div>
            </div></div>
            <div class="page-title-area"><div class="row align-items-center"><div class="col-sm-6">
                <div class="breadcrumbs-area clearfix"><h1 class="page-title float-start">Quản lý FAQ</h1></div>
            </div></div></div>

            <div class="main-content-inner" id="main-content">
                <div class="row mt-4">
                    <div class="col-md-6"><input type="text" id="searchInput" class="form-control" placeholder="Tìm câu hỏi..."></div>
                    <div class="col-md-6">
                        <button class="btn btn-primary" onclick="loadFaqs()">Tìm</button>
                        <button class="btn btn-success" onclick="openCreateModal()"><i class="fa-solid fa-plus"></i> Thêm FAQ</button>
                    </div>
                </div>

                <div class="row mt-3"><div class="col-12"><div class="card"><div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead><tr><th>#</th><th>Câu hỏi</th><th>Danh mục</th><th>Active</th><th>Thao tác</th></tr></thead>
                            <tbody id="faqBody"></tbody>
                        </table>
                    </div>
                    <nav><ul class="pagination justify-content-center" id="pagination"></ul></nav>
                </div></div></div></div>

                <!-- Create/Edit Modal -->
                <div class="modal fade" id="faqModal" tabindex="-1">
                    <div class="modal-dialog modal-lg">
                        <div class="modal-content">
                            <div class="modal-header"><h5 class="modal-title" id="modalTitle">Thêm FAQ</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                            <div class="modal-body">
                                <input type="hidden" id="editId">
                                <div class="mb-3"><label class="form-label">Câu hỏi *</label><input type="text" class="form-control" id="fQuestion"></div>
                                <div class="mb-3"><label class="form-label">Câu trả lời *</label><textarea class="form-control" id="fAnswer" rows="4"></textarea></div>
                                <div class="row">
                                    <div class="col-md-6 mb-3"><label class="form-label">Danh mục</label><input type="text" class="form-control" id="fCategory" placeholder="VD: Đơn hàng, Thanh toán..."></div>
                                    <div class="col-md-6 mb-3"><label class="form-label">Trạng thái</label>
                                        <select class="form-select" id="fActive"><option value="1">Hiện</option><option value="0">Ẩn</option></select>
                                    </div>
                                </div>
                            </div>
                            <div class="modal-footer"><button class="btn btn-primary" onclick="saveFaq()">Lưu</button></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <footer><div class="footer-area"><p>© 2026 BookStore Admin</p></div></footer>
    </div>

    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/metismenujs.min.js"></script>
    <script src="assets/js/scripts.js"></script>
    <script src="js/api.js"></script>
    <script>
        var currentPage = 1;
        function getAdminId() { try { return JSON.parse(localStorage.getItem('admin')).admin_id; } catch(e) { return 1; } }

        function loadFaqs(page) {
            currentPage = page || 1;
            var q = document.getElementById('searchInput').value;
            AdminAPI.faqs.list(q, currentPage, 10).then(function(res) {
                if (!res.success) return;
                var html = '';
                res.data.items.forEach(function(f) {
                    html += '<tr><td>' + f.faq_id + '</td><td>' + f.question + '</td><td>' + (f.category||'-') + '</td>' +
                        '<td>' + (f.is_active == 1 ? '<span class="badge bg-success">Hiện</span>' : '<span class="badge bg-secondary">Ẩn</span>') + '</td>' +
                        '<td><button class="btn btn-sm btn-warning" onclick="editFaq(' + f.faq_id + ')"><i class="fa-solid fa-edit"></i></button> ' +
                        '<button class="btn btn-sm btn-danger" onclick="deleteFaq(' + f.faq_id + ')"><i class="fa-solid fa-trash"></i></button></td></tr>';
                });
                document.getElementById('faqBody').innerHTML = html || '<tr><td colspan="5" class="text-center">Chưa có FAQ</td></tr>';
                var p = res.data.pagination, ph = '';
                for (var i = 1; i <= p.total_pages; i++) ph += '<li class="page-item '+(i===p.current_page?'active':'')+'"><a class="page-link" href="#" onclick="loadFaqs('+i+')">'+i+'</a></li>';
                document.getElementById('pagination').innerHTML = ph;
            });
        }

        function openCreateModal() {
            document.getElementById('editId').value = '';
            document.getElementById('fQuestion').value = '';
            document.getElementById('fAnswer').value = '';
            document.getElementById('fCategory').value = '';
            document.getElementById('fActive').value = '1';
            document.getElementById('modalTitle').textContent = 'Thêm FAQ';
            new bootstrap.Modal(document.getElementById('faqModal')).show();
        }

        function editFaq(id) {
            AdminAPI.faqs.detail(id).then(function(res) {
                if (!res.success) return;
                var f = res.data;
                document.getElementById('editId').value = f.faq_id;
                document.getElementById('fQuestion').value = f.question;
                document.getElementById('fAnswer').value = f.answer;
                document.getElementById('fCategory').value = f.category || '';
                document.getElementById('fActive').value = f.is_active;
                document.getElementById('modalTitle').textContent = 'Sửa FAQ #' + f.faq_id;
                new bootstrap.Modal(document.getElementById('faqModal')).show();
            });
        }

        function saveFaq() {
            var id = document.getElementById('editId').value;
            var data = {
                question: document.getElementById('fQuestion').value,
                answer: document.getElementById('fAnswer').value,
                category: document.getElementById('fCategory').value,
                is_active: parseInt(document.getElementById('fActive').value),
                admin_id: getAdminId()
            };
            var promise = id ? AdminAPI.faqs.update(id, data) : AdminAPI.faqs.create(data);
            promise.then(function(res) {
                if (res.success) {
                    bootstrap.Modal.getInstance(document.getElementById('faqModal')).hide();
                    loadFaqs(currentPage);
                    if (window.SRTdash) SRTdash.toast(id ? 'Cập nhật thành công' : 'Thêm thành công', 'success');
                } else { alert(res.message); }
            });
        }

        function deleteFaq(id) {
            if (!confirm('Xóa FAQ này?')) return;
            AdminAPI.faqs.remove(id).then(function(res) {
                if (res.success) { loadFaqs(currentPage); if (window.SRTdash) SRTdash.toast('Đã xóa', 'success'); }
            });
        }

        loadFaqs();
    </script>
</body>
</html>
